<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Portfolio - Dorian Pareja</title>
    <meta name="description" content="Le portfolio de Dorian Pareja est actuellement en cours de refonte." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14;
            --text: #e6e9ef;
            --muted: #9aa3b2;
            --accent: #59f9ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Space Grotesk", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            background: linear-gradient(90deg, var(--accent), #7b6cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        p {
            color: var(--muted);
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }

        .loader {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border: 3px solid var(--muted);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            position: absolute;
            bottom: 1rem;
            font-size: 0.9rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
<main>
    <h1>Portfolio en cours de refonte</h1>
    <p>Une nouvelle version arrive bientôt. Merci de votre patience !</p>
    <div class="loader"></div>
</main>

<footer>&copy; 2025 Dorian Pareja</footer>
</body>
</html>
